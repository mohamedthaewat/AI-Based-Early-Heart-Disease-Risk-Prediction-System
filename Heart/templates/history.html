<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardioTwin AI — Patient History</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060d1a;--surface:#0b1627;--surface2:#0f1e35;
  --border:#1a3352;--accent:#e63946;--teal:#1c7293;
  --green:#2ecc71;--orange:#f39c12;--red:#e74c3c;
  --text:#e8f0fe;--muted:#6a8aad;--muted2:#4a6a8d;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;animation:hb 1.8s ease-in-out infinite;}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.logo-name{font-size:17px;font-weight:700;letter-spacing:-.4px;}
.logo-name span{color:var(--accent);}
.back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:7px;font-size:12px;text-decoration:none;transition:all .2s;}
.back-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal);}
.main{padding:24px 32px;max-width:1300px;margin:0 auto;}
.page-title{font-size:22px;font-weight:700;margin-bottom:3px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:22px;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s;}
.stat:hover{border-color:var(--teal);}
.stat-num{font-size:30px;font-weight:700;font-family:var(--mono);line-height:1;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.07em;}
.stat-bar{height:3px;border-radius:2px;margin-top:10px;transition:width .5s ease;}

/* Toolbar */
.toolbar{display:flex;gap:10px;margin-bottom:18px;align-items:center;}
.search-box{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;font-size:13px;font-family:var(--font);}
.search-box:focus{outline:none;border-color:var(--teal);}
.btn{padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:none;font-weight:600;transition:all .2s;font-family:var(--font);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:#155a73;}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px;}
table{width:100%;border-collapse:collapse;}
th{background:#0d1f3c;padding:11px 14px;font-size:11px;font-weight:600;color:var(--muted2);text-align:left;text-transform:uppercase;letter-spacing:.07em;}
td{padding:12px 14px;font-size:13px;border-top:1px solid var(--border);}
tr:hover td{background:var(--surface2);}
tr.clickable{cursor:pointer;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-low{background:#071a10;color:var(--green);}
.badge-mid{background:#1a1007;color:var(--orange);}
.badge-high{background:#1a0707;color:var(--red);}
.del-btn{background:none;border:1px solid #3d1a1a;color:#e74c3c;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s;}
.del-btn:hover{background:#e74c3c;color:#fff;}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px;}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:720px;max-width:92%;position:relative;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.close-btn{position:absolute;top:16px;right:16px;background:none;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:15px;}
.close-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.chart-box{background:var(--surface2);border-radius:10px;padding:16px;}

@media(max-width:700px){
  .stats{grid-template-columns:1fr 1fr;}
  .main{padding:16px;}
  td:nth-child(7),td:nth-child(8),th:nth-child(7),th:nth-child(8){display:none;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">❤</div>
    <span class="logo-name">Cardio<span>Twin</span> AI</span>
  </div>
  <a href="/" class="back-btn">← Back to Assessment</a>
</div>

<div class="main">
  <p class="page-title">Patient History</p>
  <p class="page-sub">Click any patient row to view their risk timeline</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-lbl">Total Records</div>
      <div class="stat-bar" style="background:var(--teal);width:100%;"></div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:var(--green);" id="low-count">0</div>
      <div class="stat-lbl">Low Risk</div>
      <div class="stat-bar" id="low-bar" style="background:var(--green);width:0%;"></div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:var(--orange);" id="mid-count">0</div>
      <div class="stat-lbl">Moderate Risk</div>
      <div class="stat-bar" id="mid-bar" style="background:var(--orange);width:0%;"></div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:var(--red);" id="high-count">0</div>
      <div class="stat-lbl">High Risk</div>
      <div class="stat-bar" id="high-bar" style="background:var(--red);width:0%;"></div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-box" id="search" placeholder="🔍  Search by patient name..." oninput="loadPatients()">
    <button class="btn btn-teal" onclick="loadPatients()">↻ Refresh</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Patient Name</th><th>Age</th><th>Sex</th>
          <th>Risk Score</th><th>Risk Level</th><th>BP</th><th>Cholesterol</th>
          <th>Date</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="patients-tbody">
        <tr><td colspan="10" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <p class="modal-title" id="modal-name">Patient Timeline</p>
    <p class="modal-sub"  id="modal-sub">Risk score over visits</p>
    <div class="chart-box">
      <canvas id="timeline-chart" height="200"></canvas>
    </div>
  </div>
</div>

<script>
let tlChart=null, allPts=[];

async function loadPatients(){
  const s=document.getElementById('search').value;
  const res=await fetch(`/get_patients?search=${s}`);
  allPts=await res.json();
  const tbody=document.getElementById('patients-tbody');
  if(!allPts.length){tbody.innerHTML='<tr><td colspan="10" class="empty">No patients found.</td></tr>';updateStats(0,0,0,0);return;}
  tbody.innerHTML=allPts.map((p,i)=>`
    <tr class="clickable" onclick="showTimeline('${p.name}')">
      <td style="color:var(--muted);font-family:var(--mono);">${i+1}</td>
      <td style="font-weight:600;color:var(--teal);">${p.name}</td>
      <td>${p.age}</td><td>${p.sex}</td>
      <td style="font-weight:700;font-family:var(--mono);color:${p.risk<30?'var(--green)':p.risk<60?'var(--orange)':'var(--red)'};">${p.risk}%</td>
      <td><span class="badge ${p.level==='Low Risk'?'badge-low':p.level==='Moderate Risk'?'badge-mid':'badge-high'}">${p.level}</span></td>
      <td style="font-family:var(--mono);">${p.trestbps} mmHg</td>
      <td style="font-family:var(--mono);">${p.chol} mg/dL</td>
      <td style="color:var(--muted);font-size:12px;">${p.created_at}</td>
      <td><button class="del-btn" onclick="event.stopPropagation();delPt(${p.id})">Delete</button></td>
    </tr>`).join('');
  const low=allPts.filter(p=>p.level==='Low Risk').length;
  const mid=allPts.filter(p=>p.level==='Moderate Risk').length;
  const hi=allPts.filter(p=>p.level==='High Risk').length;
  updateStats(allPts.length,low,mid,hi);
}

function updateStats(total,low,mid,hi){
  document.getElementById('total-count').textContent=total;
  document.getElementById('low-count').textContent=low;
  document.getElementById('mid-count').textContent=mid;
  document.getElementById('high-count').textContent=hi;
  const pct=n=>total?Math.round(n/total*100):0;
  document.getElementById('low-bar').style.width=pct(low)+'%';
  document.getElementById('mid-bar').style.width=pct(mid)+'%';
  document.getElementById('high-bar').style.width=pct(hi)+'%';
}

async function delPt(id){
  if(!confirm('Delete this patient record?'))return;
  await fetch(`/delete_patient/${id}`,{method:'DELETE'});
  loadPatients();
}

function showTimeline(name){
  const records=allPts.filter(p=>p.name===name).reverse();
  document.getElementById('modal-name').textContent=`${name} — Risk Timeline`;
  document.getElementById('modal-sub').textContent=`${records.length} visit(s) recorded`;
  document.getElementById('modal').classList.add('active');
  if(tlChart){tlChart.destroy();tlChart=null;}
  const labels=records.map((_,i)=>`Visit ${i+1}`);
  const risks=records.map(r=>r.risk);
  const colors=risks.map(r=>r<30?'#2ecc71':r<60?'#f39c12':'#e74c3c');
  const ctx=document.getElementById('timeline-chart').getContext('2d');
  tlChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      label:'CVD Risk %',data:risks,
      borderColor:'#1c7293',backgroundColor:'rgba(28,114,147,.12)',
      pointBackgroundColor:colors,pointBorderColor:colors,
      pointRadius:8,pointHoverRadius:11,borderWidth:2,tension:.3,fill:true
    }]},
    options:{
      responsive:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`Risk: ${c.raw}%`}}},
      scales:{
        y:{min:0,max:100,ticks:{color:'#6a8aad',callback:v=>v+'%'},grid:{color:'#1a3352'}},
        x:{ticks:{color:'#6a8aad'},grid:{color:'#1a3352'}}
      }
    }
  });
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
  if(tlChart){tlChart.destroy();tlChart=null;}
}

loadPatients();
</script>
</body>
</html>
