<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardioTwin AI — Model Performance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060d1a;--surface:#0b1627;--surface2:#0f1e35;--border:#1a3352;
  --accent:#e63946;--teal:#1c7293;--green:#2ecc71;--text:#e8f0fe;--muted:#6a8aad;--font:'DM Sans',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.logo{font-size:24px;font-weight:700;}
.nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;text-decoration:none;transition:all .2s;}
.nav-btn:hover{background:var(--teal);color:#fff;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
.card-title{font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:600;text-transform:uppercase;}
.metric{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.metric:last-child{border:none;}
.metric-label{color:var(--muted);font-size:12px;}
.metric-value{font-weight:600;font-size:16px;color:var(--teal);}
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;height:350px;position:relative;}
.bar-chart{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;}
.feature-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.feature-bar{flex:1;height:20px;background:var(--surface2);border-radius:4px;margin:0 15px;overflow:hidden;}
.feature-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--accent));border-radius:4px;}
@media(max-width:768px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">❤️ Model Performance</div>
  <div>
    <a href="/dashboard" class="nav-btn">Dashboard</a>
    <a href="/" class="nav-btn" style="margin-left:10px;">← Back</a>
  </div>
</div>

<div class="grid">
  <div class="card">
    <div class="card-title">Model Info</div>
    <div class="metric">
      <span class="metric-label">Algorithm</span>
      <span class="metric-value" id="algo">-</span>
    </div>
    <div class="metric">
      <span class="metric-label">Accuracy</span>
      <span class="metric-value" id="acc">0%</span>
    </div>
    <div class="metric">
      <span class="metric-label">Features</span>
      <span class="metric-value" id="feats">0</span>
    </div>
    <div class="metric">
      <span class="metric-label">Training Samples</span>
      <span class="metric-value" id="samples">303</span>
    </div>
  </div>
</div>

<div class="bar-chart">
  <h3 style="margin-bottom:20px;color:var(--text);">Feature Importance</h3>
  <div id="features"></div>
</div>

<script>
async function loadPerformance(){
  try{
    const res=await fetch('/api/model-performance');
    const data=await res.json();
    
    document.getElementById('algo').textContent=data.model_type;
    document.getElementById('acc').textContent=data.accuracy+'%';
    document.getElementById('feats').textContent=data.total_features;
    document.getElementById('samples').textContent=data.training_samples;
    
    const maxImp=Math.max(...Object.values(data.feature_importance));
    const html=Object.entries(data.feature_importance).map(([name,imp])=>`
      <div class="feature-row">
        <span style="color:var(--muted);font-size:12px;min-width:120px;">${name}</span>
        <div class="feature-bar">
          <div class="feature-fill" style="width:${(imp/maxImp)*100}%;"></div>
        </div>
        <span style="color:var(--teal);font-size:12px;min-width:50px;text-align:right;">${(imp).toFixed(1)}%</span>
      </div>
    `).join('');
    document.getElementById('features').innerHTML=html;
  }catch(e){console.error('Error:',e);}
}
loadPerformance();
</script>

</body>
</html>
